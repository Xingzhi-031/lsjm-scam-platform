<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LSJM</title>
  <link rel="stylesheet" href="shared-ui.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup">
    <h2>LSJM</h2>
    <p class="tagline">Let Shade Just Move</p>
    <div class="modeToggle">
      <button type="button" id="modeText" class="modeBtn active">Text</button>
      <button type="button" id="modeUrl" class="modeBtn">URL</button>
    </div>
    <div id="textInputWrap">
      <label for="textInput">Paste text</label>
      <div class="extractBtns">
        <button type="button" id="btnPageText" class="extractBtn">Use page text</button>
        <button type="button" id="btnSelection" class="extractBtn">Use selection</button>
      </div>
      <textarea id="textInput" rows="3" placeholder="Paste message..."></textarea>
    </div>
    <div id="urlInputWrap" class="hidden">
      <label for="urlInput">Enter URL</label>
      <button type="button" id="btnCurrentUrl" class="extractBtn">Use current page</button>
      <input type="url" id="urlInput" placeholder="https://example.com" />
    </div>
    <button id="analyzeBtn" type="button">Analyze</button>
    <section class="resultSection" id="resultArea">
      <h3>Analysis Result</h3>
      <div id="resultPlaceholder" class="resultPlaceholder">Paste content to see if the shade moves away.</div>
      <div id="resultCard" class="resultCard hidden"></div>
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
