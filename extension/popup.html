<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LSJM</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup">
    <h2>LSJM</h2>
    <p class="tagline">Scam Detection</p>
    <section class="inputSection">
      <label for="textInput">Paste text to analyze</label>
      <textarea id="textInput" rows="4" placeholder="Paste suspicious message..."></textarea>
      <button id="analyzeBtn" type="button">Analyze</button>
    </section>
    <section class="resultSection" id="resultArea">
      <h3>Analysis Result</h3>
      <div id="resultPlaceholder" class="resultPlaceholder">Results will appear here.</div>
      <div id="resultCard" class="resultCard hidden"></div>
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
