<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LSJM</title>
  <link rel="stylesheet" href="shared-ui.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup">
    <button id="themeToggle" class="themeToggle" type="button" aria-label="Toggle theme"></button>
    <h2>LSJM</h2>
    <p class="tagline">Let Shade Just Move</p>

    <div class="enableRow">
      <label for="enableAuto">Enable page risk detection</label>
      <input type="checkbox" id="enableAuto" />
    </div>

    <button id="analyzePageBtn" type="button" class="primaryBtn">Analyze current page</button>

    <section class="resultSection" id="resultArea">
      <h3>Combined report</h3>
      <div id="resultPlaceholder" class="resultPlaceholder">Click the button to analyze this page (URL + content).</div>
      <div id="combinedCard" class="combinedCard hidden"></div>
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
