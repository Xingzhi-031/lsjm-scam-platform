<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LSJM — Let Shade Just Move | Scam Detection</title>
  <link rel="stylesheet" href="/shared/css/ui.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <h1>LSJM</h1>
    <p class="tagline">Let Shade Just Move — scam detection for messages and URLs</p>
  </header>

  <main class="main">
    <section class="input-section">
      <div class="analysis-mode-row">
        <label for="analysis-mode">Analysis mode</label>
        <select id="analysis-mode">
          <option value="hybrid">Hybrid (rule + LLM)</option>
          <option value="llm">LLM only</option>
          <option value="rule">Rule only</option>
        </select>
      </div>
      <label for="text-input">Paste suspicious message or content</label>
      <textarea id="text-input" rows="5" placeholder="Paste the message or text you want to analyze..."></textarea>
      <label for="url-input">Enter URL to analyze</label>
      <input type="url" id="url-input" placeholder="https://example.com" />
      <button id="analyze-together-btn" type="button" class="btn-together">Analyze together (text + URL)</button>
    </section>

    <section class="result-section" id="result-area">
      <h2>Analysis Result</h2>
      <div id="combined-result" class="combined-result hidden">
        <!-- Shieldy + overall risk header and report blocks injected by JS -->
      </div>
      <div id="result-placeholder" class="result-placeholder">
        Enter text and/or URL, then click "Analyze together" to see if the shade moves away.
      </div>
    </section>
  </main>

  <footer class="footer">
    <span>Let Shade Just Move</span>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
