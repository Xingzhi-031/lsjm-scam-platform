<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LSJM — Let Shade Just Move | Scam Detection</title>
  <link rel="stylesheet" href="/shared/css/ui.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <h1>LSJM</h1>
    <p class="tagline">Let Shade Just Move — scam detection for messages and URLs</p>
  </header>

  <main class="main">
    <section class="input-section">
      <div class="mode-toggle">
        <button type="button" id="mode-text" class="mode-btn active">Text</button>
        <button type="button" id="mode-url" class="mode-btn">URL</button>
      </div>
      <div id="text-input-wrap">
        <div class="analysis-mode-row">
          <label for="analysis-mode">Analysis mode</label>
          <select id="analysis-mode">
            <option value="hybrid">Hybrid (rule + LLM)</option>
            <option value="llm">LLM only</option>
            <option value="rule">Rule only</option>
          </select>
        </div>
        <label for="text-input">Paste suspicious message or content</label>
        <textarea id="text-input" rows="6" placeholder="Paste the message or text you want to analyze..."></textarea>
      </div>
      <div id="url-input-wrap" class="hidden">
        <label for="url-input">Enter URL to analyze</label>
        <input type="url" id="url-input" placeholder="https://example.com" />
      </div>
      <button id="analyze-btn" type="button">Analyze</button>
      <button id="analyze-together-btn" type="button" class="btn-together">Analyze together (text + URL)</button>
    </section>

    <section class="result-section" id="result-area">
      <h2>Analysis Result</h2>
      <div id="combined-result" class="combined-result hidden"></div>
      <div id="result-placeholder" class="result-placeholder">
        Paste content to see if the shade moves away.
      </div>
      
      <div id="result-card" class="result-card hidden">
        <div class="result-card-body">
          <div id="risk-header-area" class="risk-header-area">
            <div class="risk-header-content">
              <div class="result-row risk-row">
                <span class="label">Risk Score</span>
                <span id="riskScore" class="risk-score-num"></span>
              </div>
              <div class="result-row">
                <span class="label">Risk Level</span>
                <span id="riskLevel" class="risk-badge"></span>
              </div>
              <p id="shade-moved-msg" class="shade-moved hidden"></p>
            </div>
            <img id="shieldy-sticker" class="shieldy-sticker hidden" alt="Shieldy" aria-hidden="true">
          </div>

          <div class="section">
            <span class="label">Signals</span>
            <ul id="signalsList"></ul>
          </div>
          <div class="section">
            <span class="label">Reasons</span>
            <ul id="reasonsList"></ul>
          </div>
          <div class="section">
            <span class="label">Advice</span>
            <ul id="adviceList"></ul>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span>Let Shade Just Move</span>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
