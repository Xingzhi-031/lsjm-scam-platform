<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LSJM - Scam Detection</title>
  <link rel="stylesheet" href="/shared/css/ui.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <h1>LSJM</h1>
    <p>Let Scams Just Miss — analyze messages and URLs for scam risks</p>
  </header>

  <main class="main">
    <section class="input-section">
      <div class="mode-toggle">
        <button type="button" id="mode-text" class="mode-btn active">Text</button>
        <button type="button" id="mode-url" class="mode-btn">URL</button>
      </div>
      <div id="text-input-wrap">
        <label for="text-input">Paste suspicious message or content</label>
        <textarea id="text-input" rows="6" placeholder="Paste the message or text you want to analyze..."></textarea>
      </div>
      <div id="url-input-wrap" class="hidden">
        <label for="url-input">Enter URL to analyze</label>
        <input type="url" id="url-input" placeholder="https://example.com" />
      </div>
      <button id="analyze-btn" type="button">Analyze</button>
    </section>

    <section class="result-section" id="result-area">
      <h2>Analysis Result</h2>
      <div id="result-placeholder" class="result-placeholder">
        Results will appear here after analysis.
      </div>
      
      <div id="result-card" class="result-card hidden">

        <div class="result-row">
          <span class="label">Risk Score:</span>
          <span id="riskScore"></span>
        </div>

        <div class="result-row">
          <span class="label">Risk Level:</span>
          <span id="riskLevel" class="risk-badge"></span>
        </div>

        <div class="section">
          <span class="label">Signals</span>
          <ul id="signalsList"></ul>
        </div>

        <div class="section">
          <span class="label">Reasons</span>
          <ul id="reasonsList"></ul>
        </div>

        <div class="section">
          <span class="label">Advice</span>
          <ul id="adviceList"></ul>
        </div>

      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
